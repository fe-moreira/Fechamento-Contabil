<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contabilidade by Attentive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B1220; --panel:#131C2E; --panel2:#0F1727; --line:#22304A;
    --txt:#E8EAF0; --muted:#94A2BC; --accent:#3B82F6; --accent2:#2563EB;
    --green:#22C55E; --red:#EF4444; --amber:#F59E0B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg);color:var(--txt);font-family:'DM Sans',system-ui,sans-serif;font-size:14px;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;font-size:14px;}
  a{color:var(--accent);}
  .hidden{display:none !important;}

  /* ---------- LOGIN ---------- */
  .auth-wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px;}
  .auth-card{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:32px;}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
  .brand .logo{width:34px;height:34px;border-radius:9px;object-fit:contain;background:#0B1220;}
  .brand b{font-size:16px;font-weight:700;}
  .brand small{display:block;color:var(--muted);font-size:11px;font-weight:500;}
  .auth-card h2{font-size:18px;margin:0 0 4px;}
  .auth-card p.sub{color:var(--muted);margin:0 0 20px;font-size:13px;}
  label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px;}
  .field{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:11px 12px;color:var(--txt);}
  .field:focus{outline:none;border-color:var(--accent);}
  .btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:12px;font-weight:600;font-size:14px;margin-top:20px;}
  .btn:hover{background:var(--accent2);}
  .btn.sec{background:transparent;border:1px solid var(--line);color:var(--txt);margin-top:10px;}
  .btn.sec:hover{border-color:var(--accent);}
  .msg{margin-top:14px;font-size:13px;padding:10px 12px;border-radius:8px;display:none;}
  .msg.err{display:block;background:rgba(239,68,68,.12);color:#FCA5A5;border:1px solid rgba(239,68,68,.3);}
  .msg.ok{display:block;background:rgba(34,197,94,.12);color:#86EFAC;border:1px solid rgba(34,197,94,.3);}
  .toggle{text-align:center;margin-top:18px;color:var(--muted);font-size:13px;}
  .toggle a{cursor:pointer;}

  /* ---------- APP SHELL ---------- */
  .app{display:flex;height:100vh;overflow:hidden;}
  .side{width:248px;flex-shrink:0;background:var(--panel2);border-right:1px solid var(--line);display:flex;flex-direction:column;}
  .side .brand{padding:18px 18px 14px;margin:0;border-bottom:1px solid var(--line);}
  .nav{flex:1;overflow-y:auto;padding:12px 10px;}
  .nav .grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:14px 10px 6px;}
  .nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:#C5CFE3;text-decoration:none;font-size:13.5px;margin:2px 0;border-left:3px solid transparent;}
  .nav a:hover{background:rgba(255,255,255,.04);}
  .nav a.active{background:rgba(59,130,246,.14);color:#fff;border-left-color:var(--accent);}
  .nav a .ico{width:18px;text-align:center;opacity:.85;}
  .nav a .soon{margin-left:auto;font-size:9.5px;background:var(--line);color:var(--muted);padding:2px 6px;border-radius:6px;}
  .side .foot{padding:12px;border-top:1px solid var(--line);}
  .side .foot .who{font-size:12px;color:var(--muted);padding:4px 8px 10px;}
  .side .foot .who b{color:var(--txt);display:block;font-size:13px;}

  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .topbar{height:56px;flex-shrink:0;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:var(--panel2);}
  .topbar .ttl{font-size:13px;color:var(--muted);}
  .content{flex:1;overflow-y:auto;padding:28px 32px;}
  .content h1{font-size:22px;margin:0 0 4px;}
  .content .lead{color:var(--muted);margin:0 0 24px;}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px;}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;}
  .stat .n{font-size:28px;font-weight:700;}
  .stat .l{color:var(--muted);font-size:13px;margin-top:2px;}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:0;overflow:hidden;}
  .panel .ph{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line);}
  .panel .ph h3{margin:0;font-size:15px;}
  table{width:100%;border-collapse:collapse;}
  th,td{text-align:left;padding:12px 20px;font-size:13px;border-bottom:1px solid var(--line);}
  th{color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:rgba(255,255,255,.025);}
  .pill{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--line);color:#C5CFE3;}
  .empty{padding:40px 20px;text-align:center;color:var(--muted);}

  .btn-sm{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:600;font-size:13px;}
  .btn-sm:hover{background:var(--accent2);}
  .btn-sm.ghost{background:transparent;border:1px solid var(--line);color:var(--txt);}
  .btn-sm.danger{background:transparent;border:1px solid rgba(239,68,68,.4);color:#FCA5A5;}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(2,6,16,.6);display:flex;align-items:center;justify-content:center;padding:24px;z-index:50;}
  .modal{width:100%;max-width:560px;max-height:90vh;overflow-y:auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;}
  .modal .mh{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line);}
  .modal .mh h3{margin:0;font-size:16px;}
  .modal .mb{padding:20px 22px;}
  .modal .mf{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .x{background:none;border:none;color:var(--muted);font-size:20px;line-height:1;}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--green);border-radius:10px;padding:14px 18px;z-index:60;font-size:13px;box-shadow:0 8px 30px rgba(0,0,0,.4);}
</style>
</head>

function toast(t){

}

// ---------------- AUTH ----------------
function renderAuth(mode='login'){
  const reset = mode==='reset';
  const campo = "width:100%;box-sizing:border-box;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:12px 14px;font-size:14px;color:#fff;outline:none;margin-top:6px;font-family:inherit;";
  const rot = "font-size:12.5px;font-weight:600;color:#aebfe0;";
  root.innerHTML = `
  <div style="min-height:100%;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(140deg,#16234d,#0a1530);font-family:'Montserrat','Segoe UI',system-ui,sans-serif;">
    <div style="width:100%;max-width:380px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:26px;">
        <img src="${LOGO}" alt="Attentive" style="width:46px;height:46px;border-radius:11px;">
        <div style="display:flex;flex-direction:column;line-height:1.1;">
          <span style="font-size:22px;font-weight:700;color:#fff;letter-spacing:-.01em;">Contabilidade</span>
          <span style="font-size:13px;font-weight:600;color:#7e9cd8;">by Attentive</span>
        </div>
      </div>
      <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:26px 24px;">
        <div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:4px;">${reset?'Recuperar senha':'Entrar'}</div>
        <div style="font-size:12.5px;color:#aebfe0;margin-bottom:20px;">${reset?'Enviaremos um link para redefinir sua senha.':'Acesse a plataforma de fechamento contábil da Attentive.'}</div>
        <label style="${rot}">E-mail
          <input id="email" type="email" placeholder="voce@attentivecontabilidade.com.br" autocomplete="email" style="${campo}">
        </label>
        ${reset?'':`<label style="display:block;margin-top:14px;${rot}">Senha
          <input id="senha" type="password" placeholder="••••••••" autocomplete="current-password" style="${campo}">
        </label>`}
        <div id="erro" style="display:none;margin-top:14px;font-size:12.5px;color:#ffb4b4;background:rgba(255,80,80,.1);border:1px solid rgba(255,80,80,.25);border-radius:9px;padding:9px 12px;"></div>
        <div id="aviso" style="display:none;margin-top:14px;font-size:12.5px;color:#bfe6c4;background:rgba(60,200,120,.1);border:1px solid rgba(60,200,120,.25);border-radius:9px;padding:9px 12px;"></div>
        <button id="go" style="width:100%;margin-top:20px;background:#2e5cb8;color:#fff;border:none;border-radius:10px;padding:12px 16px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;">${reset?'Enviar link':'Entrar'}</button>
        <div style="text-align:center;margin-top:16px;">
          <button id="sw" style="background:transparent;border:none;color:#7e9cd8;font-size:12.5px;cursor:pointer;font-family:inherit;font-weight:600;">${reset?'Voltar ao login':'Esqueci minha senha'}</button>
        </div>
      </div>
      <div style="text-align:center;margin-top:18px;font-size:11.5px;color:#aebfe0;">Acesso restrito · Grupo Attentive</div>
    </div>
  </div>`;

  const erro=t=>{const e=document.getElementById('erro');e.style.display='block';e.textContent=t;document.getElementById('aviso').style.display='none';};
  const aviso=t=>{const a=document.getElementById('aviso');a.style.display='block';a.textContent=t;document.getElementById('erro').style.display='none';};
  document.getElementById('sw').onclick=()=>renderAuth(reset?'login':'reset');
  const go=document.getElementById('go');
  go.onclick=async()=>{
    const email=document.getElementById('email').value.trim();
    if(!email){erro('Informe seu e-mail.');return;}
    if(reset){
      go.textContent='Aguarde…';
      const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin});
      go.textContent='Enviar link';
      if(error)erro('Não foi possível enviar o e-mail de recuperação.');
      else aviso('Enviamos um link de recuperação para o seu e-mail.');
      return;
    }
    const senha=document.getElementById('senha').value;
    if(!senha){erro('Preencha e-mail e senha.');return;}
    go.textContent='Aguarde…';
    const {error}=await sb.auth.signInWithPassword({email:email,password:senha});
    if(error){go.textContent='Entrar';erro(traduz(error.message||'Erro'));return;}
    await boot();
  };
  root.querySelectorAll('input').forEach(i=>i.addEventListener('keydown',e=>{if(e.key==='Enter')go.click();}));
}
function traduz(m){
  if(/Invalid login/i.test(m))return 'E-mail ou senha incorretos.';
  if(/already registered/i.test(m))return 'Esse e-mail já tem conta. Faça login.';
  if(/at least 6/i.test(m))return 'A senha precisa ter ao menos 6 caracteres.';
  if(/Email not confirmed/i.test(m))return 'E-mail ainda não confirmado. Verifique sua caixa de entrada.';
  return m;
}

// ---------------- APP SHELL ----------------
const MENU = [
  {grp:'Principal'},
  {id:'dashboard', ico:'▤', label:'Dashboard'},
  {id:'clientes',  ico:'▦', label:'Cadastro de Clientes'},
  {grp:'Fechamento Contábil'},
  {id:'fechamentos', ico:'◷', label:'Fechamentos', soon:true},
  {id:'razao',       ico:'↧', label:'Importar Razão', soon:true},
  {id:'conciliacao', ico:'▥', label:'Conciliação', soon:true},
  {id:'comparativo', ico:'⇄', label:'Comp. Movimento', soon:true},
  {id:'contabilizar',ico:'✎', label:'Contabilizar', soon:true},
  {id:'relatorios',  ico:'▤', label:'Relatórios', soon:true},
  {id:'status',      ico:'◉', label:'Status', soon:true},
];

function renderApp(){
  const nome = profile?.nome || me?.email || 'Usuário';
  const perfil = profile?.perfil || 'analista';
  const nav = MENU.map(m=>{
    if(m.grp) return `<div class="grp">${m.grp}</div>`;
    return `<a data-id="${m.id}" class="${m.id===current?'active':''}">
      <span class="ico">${m.ico}</span>${m.label}
      ${m.soon?'<span class="soon">em breve</span>':''}</a>`;
  }).join('');
  root.innerHTML = `
  <div class="app">
    <div class="side">
      ${brand}
      <div class="nav">${nav}</div>
      <div class="foot">
        <div class="who"><b>${esc(nome)}</b>${esc(me.email)} · ${esc(perfil)}</div>
        <button id="logout" class="btn-sm ghost" style="width:100%">Sair</button>
      </div>
    </div>
    <div class="main">
      <div class="topbar"><div class="ttl">Contabilidade by Attentive</div><div class="ttl" id="clock"></div></div>
      <div class="content" id="view"></div>
    </div>
  </div>`;
  root.querySelectorAll('.nav a').forEach(a=>a.onclick=()=>{const m=MENU.find(x=>x.id===a.dataset.id);if(m.soon){toast('Módulo "'+m.label+'" em construção.');return;}current=a.dataset.id;renderApp();});
  document.getElementById('logout').onclick=async()=>{await sb.auth.signOut();me=null;profile=null;renderAuth('login');};
  const view=document.getElementById('view');
  if(current==='dashboard') viewDashboard(view);
  else if(current==='clientes') viewClientes(view);
}

// ---------------- DASHBOARD ----------------
async function viewDashboard(el){
  el.innerHTML=`<h1>Dashboard</h1><p class="lead">Visão geral do fechamento contábil.</p>
    <div class="cards" id="cards">
      <div class="stat"><div class="n" id="c-cli">…</div><div class="l">Clientes cadastrados</div></div>
      <div class="stat"><div class="n" id="c-comp">…</div><div class="l">Competências</div></div>
      <div class="stat"><div class="n" id="c-and">…</div><div class="l">Em andamento</div></div>
      <div class="stat"><div class="n" id="c-ok">…</div><div class="l">Concluídas</div></div>
    </div>
    <div class="panel"><div class="ph"><h3>Bem-vindo 👋</h3></div>
      <div style="padding:20px;color:var(--muted);line-height:1.6">
        Esta é a <b>primeira versão funcionando</b> da plataforma, já conectada ao banco de dados.<br>
        Comece cadastrando seus clientes em <b>Cadastro de Clientes</b>. Os demais módulos
        (Importar Razão, Conciliação, etc.) entram nas próximas etapas.
      </div></div>`;
  const [cli,comp,and_,ok]=await Promise.all([
    sb.from('clientes').select('id',{count:'exact',head:true}),
    sb.from('competencias').select('id',{count:'exact',head:true}),
    sb.from('competencias').select('id',{count:'exact',head:true}).eq('status','em_andamento'),
    sb.from('competencias').select('id',{count:'exact',head:true}).eq('status','concluido'),
  ]);
  document.getElementById('c-cli').textContent=cli.count??0;
  document.getElementById('c-comp').textContent=comp.count??0;
  document.getElementById('c-and').textContent=and_.count??0;
  document.getElementById('c-ok').textContent=ok.count??0;
}

// ---------------- CLIENTES ----------------
async function viewClientes(el){
  el.innerHTML=`<h1>Cadastro de Clientes</h1><p class="lead">As empresas atendidas. Importação em lote e filiais.</p>
    <div class="panel">
      <div class="ph"><h3>Clientes</h3><button id="novo" class="btn-sm">+ Novo cliente</button></div>
      <div id="lista"><div class="empty">Carregando…</div></div>
    </div>`;
  document.getElementById('novo').onclick=()=>formCliente();
  await listaClientes();
}
async function listaClientes(){
  const cont=document.getElementById('lista');
  const {data,error}=await sb.from('clientes').select('*').order('razao_social');
  if(error){cont.innerHTML=`<div class="empty">Erro ao carregar: ${esc(error.message)}</div>`;return;}
  if(!data.length){cont.innerHTML=`<div class="empty">Nenhum cliente ainda. Clique em <b>“+ Novo cliente”</b> para começar.</div>`;return;}
  cont.innerHTML=`<table><thead><tr>
    <th>Cód. Domínio</th><th>Razão Social</th><th>CNPJ</th><th>Tipo</th><th>Regime</th><th>Analista</th><th></th>
    </tr></thead><tbody>${data.map(c=>`<tr>
      <td>${esc(c.codigo_dominio)}</td>
      <td>${esc(c.razao_social)}${c.nome_fantasia?`<br><span style="color:var(--muted);font-size:12px">${esc(c.nome_fantasia)}</span>`:''}</td>
      <td>${esc(c.cnpj)||'—'}</td>
      <td><span class="pill">${esc(c.tipo)}</span></td>
      <td>${esc(c.regime_tributario)||'—'}</td>
      <td>${esc(c.analista)||'—'}</td>
      <td style="text-align:right;white-space:nowrap">
        <button class="btn-sm ghost ed" data-id="${c.id}">Editar</button>
        <button class="btn-sm danger del" data-id="${c.id}">Excluir</button></td>
    </tr>`).join('')}</tbody></table>`;
  cont.querySelectorAll('.ed').forEach(b=>b.onclick=()=>formCliente(data.find(x=>x.id===b.dataset.id)));
  cont.querySelectorAll('.del').forEach(b=>b.onclick=async()=>{
    if(!confirm('Excluir este cliente?'))return;
    const {error}=await sb.from('clientes').delete().eq('id',b.dataset.id);
    if(error)toast('Erro: '+error.message);else{toast('Cliente excluído.');listaClientes();}
  });
}
function formCliente(c){
  const ed=!!c; c=c||{};
  const F=(id,v)=>`value="${esc(v)}"`;
  const bg=document.createElement('div');bg.className='modal-bg';
  bg.innerHTML=`<div class="modal">
    <div class="mh"><h3>${ed?'Editar cliente':'Novo cliente'}</h3><button class="x" id="x">×</button></div>
    <div class="mb">
      <div class="grid2">
        <div><label>Código no Domínio *</label><input id="codigo_dominio" class="field" ${F('',c.codigo_dominio)}></div>
        <div><label>Tipo</label><select id="tipo" class="field">
          <option value="matriz"${c.tipo!=='filial'?' selected':''}>Matriz</option>
          <option value="filial"${c.tipo==='filial'?' selected':''}>Filial</option></select></div>
      </div>
      <label>Razão Social *</label><input id="razao_social" class="field" ${F('',c.razao_social)}>
      <div class="grid2">
        <div><label>Nome Fantasia</label><input id="nome_fantasia" class="field" ${F('',c.nome_fantasia)}></div>
        <div><label>CNPJ</label><input id="cnpj" class="field" ${F('',c.cnpj)}></div>
      </div>
      <div class="grid2">
        <div><label>Regime Tributário</label><input id="regime_tributario" class="field" placeholder="Simples / Presumido / Real" ${F('',c.regime_tributario)}></div>
        <div><label>Analista</label><input id="analista" class="field" ${F('',c.analista)}></div>
      </div>
      <div class="grid2">
        <div><label>Tipo de Fechamento</label><input id="tipo_fechamento" class="field" ${F('',c.tipo_fechamento)}></div>
        <div><label>Integração Financeira</label><select id="integracao_financeira" class="field">
          <option value=""></option>
          <option value="sistema"${c.integracao_financeira==='sistema'?' selected':''}>Sistema</option>
          <option value="excel"${c.integracao_financeira==='excel'?' selected':''}>Excel</option></select></div>
      </div>
      <label>Observações</label><textarea id="observacoes" class="field" rows="2">${esc(c.observacoes)}</textarea>
      <div id="fmsg" class="msg"></div>
    </div>
    <div class="mf"><button class="btn-sm ghost" id="cancel">Cancelar</button><button class="btn-sm" id="save">${ed?'Salvar':'Cadastrar'}</button></div>
  </div>`;
  document.body.appendChild(bg);
  const close=()=>bg.remove();
  bg.querySelector('#x').onclick=close;bg.querySelector('#cancel').onclick=close;
  bg.onclick=e=>{if(e.target===bg)close();};
  bg.querySelector('#save').onclick=async()=>{
    const g=id=>bg.querySelector('#'+id).value.trim();
    const reg={
      codigo_dominio:g('codigo_dominio'), tipo:g('tipo'), razao_social:g('razao_social'),
      nome_fantasia:g('nome_fantasia')||null, cnpj:g('cnpj')||null,
      regime_tributario:g('regime_tributario')||null, analista:g('analista')||null,
      tipo_fechamento:g('tipo_fechamento')||null,
      integracao_financeira:g('integracao_financeira')||null, observacoes:g('observacoes')||null
    };
    const m=bg.querySelector('#fmsg');
    if(!reg.codigo_dominio||!reg.razao_social){m.className='msg err';m.textContent='Preencha Código no Domínio e Razão Social.';return;}
    let error;
    if(ed){({error}=await sb.from('clientes').update(reg).eq('id',c.id));}
    else {({error}=await sb.from('clientes').insert(reg));}
    if(error){m.className='msg err';m.textContent=/duplicate|unique/i.test(error.message)?'Já existe um cliente com esse Código no Domínio.':error.message;return;}
    close();toast(ed?'Cliente atualizado.':'Cliente cadastrado.');listaClientes();
  };
}

// ---------------- BOOT ----------------
async function boot(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){renderAuth('login');return;}
  me=session.user;
  const {data:p}=await sb.from('profiles').select('*').eq('id',me.id).maybeSingle();
  profile=p;
  current='dashboard';
  renderApp();
}
sb.auth.onAuthStateChange((_e,s)=>{ if(!s && me){ me=null;profile=null;renderAuth('login'); } });
boot();
</script>
</body>
</html>
